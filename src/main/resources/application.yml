spring:
  application:
    name: mcp-git-assistant
  ai:
    openai:
      # API key is read from the OPENAI_API_KEY environment variable.
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5-nano
          temperature: 1
    model:
      chat: openai
    mcp:
      server:
        name: mcp-git-assistant
        version: 0.0.1
        type: SYNC

git-assistant:
  repo-path: ${MCP_GIT_REPO_PATH:.}
